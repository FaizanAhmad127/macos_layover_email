name: macos_layover_email
description: "macOS overlay banner app that shows incoming email subjects."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  window_manager: ^0.3.0
  enough_mail: ^2.0.0
  flutter_bloc: ^8.1.0
  equatable: ^2.0.5
  get_it: ^7.6.0
  lottie: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  mocktail: ^1.0.0
  bloc_test: ^9.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
